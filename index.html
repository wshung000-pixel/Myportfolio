<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產追蹤">
<meta name="theme-color" content="#f2f2f7">
<title>資產追蹤</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#f2f2f7;
  --bg2:#ffffff;
  --bg3:#e5e5ea;
  --card:#ffffff;
  --border:#d1d1d6;
  --accent:#3478f6;
  --accent2:#30b0c7;
  --green:#e07070;
  --red:#ff3b30;
  --text:#1c1c1e;
  --text2:#6e6e73;
  --text3:#aeaeb2;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* Header */
.header{padding:calc(var(--safe-top) + 16px) 20px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#1c1c1e 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.total-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text)}

/* Tab bar */
.tab-bar{display:flex;padding:12px 16px;gap:8px;background:var(--bg);position:sticky;top:calc(var(--safe-top) + 69px);z-index:99}
.tab{flex:1;padding:8px 0;font-size:13px;font-weight:600;border:1px solid var(--border);border-radius:10px;background:none;color:var(--text2);cursor:pointer;transition:all .2s;letter-spacing:.01em}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.section{display:block}

/* Metric cards */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border)}
.metric.full{grid-column:1/-1}
.metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:700;letter-spacing:-0.5px}
.metric-sub{font-size:12px;margin-top:3px}
.up{color:var(--green)}.down{color:var(--red)}.muted{color:var(--text2)}

/* Cards */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.form-input,.form-select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;width:100%;outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--bg3)}
.add-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:opacity .2s}
.add-btn:active{opacity:.8}

/* Stock rows */
.stock-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.stock-row:last-child{border-bottom:none}
.stock-left{flex:1}
.stock-sym{font-size:16px;font-weight:700;letter-spacing:.01em}
.stock-meta{font-size:12px;color:var(--text2);margin-top:2px}
.stock-right{text-align:right}
.stock-mv{font-size:15px;font-weight:600}
.stock-pnl{font-size:12px;margin-top:2px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:5px;letter-spacing:.05em}
.badge-tw{background:rgba(52,120,246,.12);color:#3478f6}
.badge-us{background:rgba(224,112,112,.15);color:#c85050}
.badge-bank{background:rgba(180,140,40,.15);color:#9a7820}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;padding:4px 8px;cursor:pointer;margin-left:8px}
.del-btn:active{color:var(--red)}

/* Empty state */
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}

/* Refresh bar */
.refresh-bar{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.refresh-btn:active{opacity:.7}
.refresh-status{font-size:11px;color:var(--text3)}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px;padding:8px 0}
.donut-svg{flex-shrink:0}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend-name{font-size:12px;color:var(--text2);flex:1}
.legend-pct{font-size:13px;font-weight:700}

/* PnL bars */
.pnl-bar-wrap{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.pnl-item{display:flex;align-items:center;gap:10px}
.pnl-sym{font-size:12px;font-weight:700;width:52px;flex-shrink:0;text-align:right}
.pnl-track{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.pnl-fill{height:100%;border-radius:4px;transition:width .6s ease}
.pnl-val{font-size:11px;width:80px;text-align:right;flex-shrink:0}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}

/* Status msg */
.status-msg{font-size:12px;color:var(--text2);padding:6px 0;min-height:20px}

/* Backup toast */
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 90px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px 18px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:10px;z-index:999;white-space:nowrap;animation:slideUp .3s ease}
.toast.hide{animation:fadeOut .4s ease forwards}
.toast-icon{font-size:16px;width:16px;height:16px}

/* Backup section */
.backup-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.backup-btn{flex:1;padding:10px 0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.backup-btn:active{opacity:.7}
.backup-btn.import{color:var(--accent2);border-color:rgba(78,205,196,.3)}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="app-title">資產追蹤</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="refreshAll()" id="header-refresh-btn" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--text2);font-size:18px;line-height:1">↻</button>
      <div class="total-badge" id="header-total">NT$ 0</div>
    </div>
  </div>
  <div id="header-refresh-status" style="font-size:10px;color:var(--text3);text-align:right;margin-top:2px;min-height:12px"></div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('overview',this)">總覽</button>
  <button class="tab" onclick="switchTab('stocks',this)">股票</button>
  <button class="tab" onclick="switchTab('bank',this)">存款</button>
  <button class="tab" onclick="switchTab('charts',this)">圖表</button>
</div>

<div class="content" id="swipe-container" style="overflow-y:auto;overflow-x:hidden;padding:0">
<div id="swipe-wrapper" style="display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;height:100%;align-items:flex-start">

<!-- 總覽 -->
<div id="sec-overview" class="section active" style="min-width:100%;padding:16px 16px calc(var(--safe-bot) + 80px);overflow-y:auto;height:100%">

  <!-- 大數字主卡 -->
  <div class="card" style="text-align:center;padding:20px 16px">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">總現值</div>
    <div style="font-size:36px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1" id="ov-total-big">NT$ 0</div>
    <div id="ov-yesterday" style="font-size:13px;font-weight:600;margin-top:8px;min-height:18px"></div>
    <div id="rate-badge" style="font-size:11px;color:var(--text3);margin-top:6px">1 USD = 32.00 TWD（預設值）</div>
  </div>

  <div class="metrics" id="overview-metrics">
    <div class="metric"><div class="metric-label">股票市值 <span style="font-size:9px;font-weight:400;color:var(--text3)">NT$</span></div><div class="metric-value muted" id="ov-stock">0</div></div>
    <div class="metric"><div class="metric-label">銀行存款 <span style="font-size:9px;font-weight:400;color:var(--text3)">NT$</span></div><div class="metric-value muted" id="ov-bank">0</div></div>
    <div class="metric"><div class="metric-label">未實現損益 <span style="font-size:9px;font-weight:400;color:var(--text3)">NT$</span></div><div class="metric-value" id="ov-pnl">0</div><div class="metric-sub" id="ov-pct"></div></div>
    <div class="metric"><div class="metric-label">已實現損益 <span style="font-size:9px;font-weight:400;color:var(--text3)">NT$</span></div><div class="metric-value" id="ov-realized">0</div></div>
  </div>
  <div class="card">
    <div class="card-title">資產配置</div>
    <div class="donut-wrap">
      <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100" id="donut-svg"><circle cx="50" cy="50" r="40" fill="none" stroke="#e5e5ea" stroke-width="18"/></svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">損益概況</div>
    <div class="pnl-bar-wrap" id="pnl-bars"><div class="empty">尚無股票損益資料</div></div>
  </div>
</div>

<!-- 股票 -->
<div id="sec-stocks" class="section" style="min-width:100%;padding:16px 16px calc(var(--safe-bot) + 80px);overflow-y:auto;height:100%">
  <div class="card">
    <div class="card-title">新增股票</div>
    <div class="form-grid">
      <div class="form-group">
        <div class="form-label">市場</div>
        <select class="form-select" id="mkt"><option value="TW">台股</option><option value="US">美股</option></select>
      </div>
      <div class="form-group">
        <div class="form-label">股票代號</div>
        <input class="form-input" id="sym" placeholder="2330 / AAPL" autocomplete="off" autocorrect="off" autocapitalize="characters">
      </div>
      <div class="form-group">
        <div class="form-label">持股數量</div>
        <input class="form-input" id="qty" type="number" placeholder="100" step="any" inputmode="decimal">
      </div>
      <div class="form-group">
        <div class="form-label">平均成本(元)</div>
        <input class="form-input" id="cost" type="number" placeholder="800" inputmode="decimal">
      </div>
      <div class="form-group full">
        <div class="form-label">買入日期</div>
        <input class="form-input" id="buydate" type="date">
      </div>
    </div>
    <div class="status-msg" id="add-msg"></div>
    <button class="add-btn" onclick="addStock()">新增股票</button>
  </div>
  <div class="card" id="realized-card" style="display:none">
    <div class="card-title">已實現損益</div>
    <div id="realized-list"></div>
  </div>
  <div class="card">
    <div class="card-title">持股清單</div>
    <div id="stock-list"></div>
    <div style="padding-top:10px;min-height:16px">
      <span class="refresh-status" id="refresh-status"></span>
    </div>
    <div class="backup-row">
      <button class="backup-btn" onclick="exportBackup()">⬇ 匯出備份</button>
      <label class="backup-btn import" style="cursor:pointer">⬆ 匯入備份<input type="file" accept=".json" onchange="importBackup(event)" style="display:none"></label>
    </div>
  </div>
</div>

<!-- 存款 -->
<div id="sec-bank" class="section" style="min-width:100%;padding:16px 16px calc(var(--safe-bot) + 80px);overflow-y:auto;height:100%">
  <div class="card">
    <div class="card-title">新增帳戶</div>
    <div class="form-grid">
      <div class="form-group full">
        <div class="form-label">銀行名稱</div>
        <input class="form-input" id="bname" placeholder="台灣銀行" autocomplete="off">
      </div>
      <div class="form-group">
        <div class="form-label">類型</div>
        <select class="form-select" id="btype"><option value="活存">活存</option><option value="定存">定存</option><option value="外幣">外幣</option></select>
      </div>
      <div class="form-group">
        <div class="form-label">年利率(%)</div>
        <input class="form-input" id="brate" type="number" placeholder="1.5" step="0.01" inputmode="decimal">
      </div>
      <div class="form-group">
        <div class="form-label">幣別</div>
        <select class="form-select" id="bcurrency">
          <option value="TWD">台幣 TWD</option>
          <option value="USD">美金 USD</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">金額</div>
        <input class="form-input" id="bamount" type="number" placeholder="500000" inputmode="decimal" step="any">
      </div>
    </div>
    <button class="add-btn" onclick="addBank()">新增帳戶</button>
  </div>
  <div class="card">
    <div class="card-title">存款帳戶</div>
    <div id="bank-list"></div>
  </div>
</div>

<!-- 圖表 -->
<div id="sec-charts" class="section" style="min-width:100%;padding:16px 16px calc(var(--safe-bot) + 80px);overflow-y:auto;height:100%">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">資產走勢</div>
      <button onclick="takeSnapshot()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit">記錄今日</button>
    </div>
    <canvas id="trend-canvas" style="display:none;width:100%"></canvas>
    <div id="trend-empty" style="text-align:center;padding:28px 0 8px;color:var(--text3)">
      <div style="font-size:28px;margin-bottom:8px">📈</div>
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px">尚無走勢資料</div>
      <div style="font-size:12px;line-height:1.6">點「記錄今日」開始追蹤<br>累積 2 天後顯示曲線</div>
    </div>
    <div id="trend-stats" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex">
        <div style="flex:1;text-align:center">
          <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">記錄天數</div>
          <div style="font-size:20px;font-weight:700;color:var(--text)" id="ts-days">0</div>
        </div>
        <div style="flex:1;text-align:center;border-left:1px solid var(--border)">
          <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">總成長</div>
          <div style="font-size:20px;font-weight:700" id="ts-growth">—</div>
        </div>
        <div style="flex:1;text-align:center;border-left:1px solid var(--border)">
          <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">成長率</div>
          <div style="font-size:20px;font-weight:700" id="ts-pct">—</div>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">資產配置</div>
    <div id="ch-alloc-empty" class="empty" style="padding:16px 0">尚無資產資料</div>
    <div id="ch-alloc-content" style="display:none">
      <svg id="ch-alloc-svg" viewBox="0 0 280 160" width="100%" style="display:block;margin:0 auto 16px"></svg>
      <div id="ch-alloc-bars"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">個股損益</div>
    <div id="ch-stock-pnl"><div class="empty">尚無持股資料</div></div>
  </div>
</div>

</div><!-- end swipe-wrapper -->
</div><!-- end swipe-container -->

<script>
let USD_RATE = 32;
let USD_RATE_DATE = null;
async function updateUsdRate(){
  try{
    const r = await fetch('https://open.er-api.com/v6/latest/USD', {signal: AbortSignal.timeout(6000)});
    const d = await r.json();
    const rate = d?.rates?.TWD;
    if(rate && rate > 0){
      USD_RATE = rate;
      USD_RATE_DATE = new Date();
      renderRateBadge();
      return rate;
    }
  }catch(e){}
  return USD_RATE;
}
function renderRateBadge(){
  const el = document.getElementById('rate-badge');
  if(!el) return;
  const dateStr = USD_RATE_DATE
    ? USD_RATE_DATE.toLocaleDateString('zh-TW') + ' ' + USD_RATE_DATE.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})
    : '預設值';
  el.textContent = `1 USD = ${USD_RATE.toFixed(2)} TWD（${dateStr}）`;
}
let stocks = JSON.parse(localStorage.getItem('pt_stocks')||'[]');
let banks  = JSON.parse(localStorage.getItem('pt_banks')||'[]');
let bankPrev = {}; // stores previous amount per bank id for undo
let realized = JSON.parse(localStorage.getItem('pt_realized')||'[]');
let snapshots = JSON.parse(localStorage.getItem('pt_snapshots')||'[]');
let priceHistory = JSON.parse(localStorage.getItem('pt_price_history')||'{}');

function save(){
  localStorage.setItem('pt_stocks',JSON.stringify(stocks));
  localStorage.setItem('pt_banks',JSON.stringify(banks));
  localStorage.setItem('pt_realized',JSON.stringify(realized));
  localStorage.setItem('pt_snapshots',JSON.stringify(snapshots));
  localStorage.setItem('pt_price_history',JSON.stringify(priceHistory));
  autoBackup();
}

/* ── Toast ── */
let toastTimer=null;
function showToast(msg,icon='✅'){
  let t=document.getElementById('toast');
  if(t)t.remove();
  clearTimeout(toastTimer);
  t=document.createElement('div');
  t.id='toast';t.className='toast';
  t.innerHTML=`<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),400);},2800);
}

/* ── Auto backup on page leave ── */
function autoBackup(){
  // 靜默儲存，不做任何動作
}
function doBackupDownload(){
  if(!stocks.length && !banks.length) return;
  const data={stocks,banks,savedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');
  a.href=url;a.download=`資產備份_${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
window.addEventListener('beforeunload', ()=>{ doBackupDownload(); });
window.addEventListener('pagehide', ()=>{ doBackupDownload(); });

/* ── Manual export ── */
function exportBackup(){
  const data={stocks,banks,snapshots,priceHistory,savedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');
  a.href=url;a.download=`資產備份_${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('備份匯出完成','💾');

function importBackup(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.stocks||!data.banks)throw new Error('格式錯誤');
      if(!confirm(`確定匯入備份？\n備份時間：${data.savedAt?new Date(data.savedAt).toLocaleString('zh-TW'):'未知'}\n目前資料將被覆蓋。`))return;
      stocks=data.stocks; banks=data.banks;
      if(data.snapshots) snapshots=data.snapshots;
      if(data.priceHistory) priceHistory=data.priceHistory;
      localStorage.setItem('pt_stocks',JSON.stringify(stocks));
      localStorage.setItem('pt_banks',JSON.stringify(banks));
      localStorage.setItem('pt_snapshots',JSON.stringify(snapshots));
      localStorage.setItem('pt_price_history',JSON.stringify(priceHistory));
      renderStockList();renderBankList();renderOverview();
      showToast('備份匯入成功','✅');
    }catch(err){showToast('匯入失敗：格式不正確','❌');}
    event.target.value='';
  };
  reader.readAsText(file);
}

function goToTab(idx){
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((b,i)=> b.classList.toggle('active', i===idx));

/* ── Swipe gestures ── */
(function(){
  const el = document.getElementById('swipe-container');
  let startX=0, startY=0, diffX=0, isDragging=false, isHorizontal=null;

  el.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    diffX = 0; isDragging=true; isHorizontal=null;
    document.getElementById('swipe-wrapper').style.transition='none';
  }, {passive:true});

  el.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    diffX = e.touches[0].clientX - startX;
    const diffY = e.touches[0].clientY - startY;
    if(isHorizontal===null) isHorizontal = Math.abs(diffX) > Math.abs(diffY);
    if(!isHorizontal) return;
    const base = currentTab * 100;
    document.getElementById('swipe-wrapper').style.transform = `translateX(calc(-${base}% + ${diffX}px))`;
  }, {passive:true});

  el.addEventListener('touchend', e=>{
    isDragging=false;
    document.getElementById('swipe-wrapper').style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
    if(!isHorizontal){ goToTab(currentTab); return; }
    if(diffX < -50 && currentTab < TABS.length-1) goToTab(currentTab+1);
    else if(diffX > 50 && currentTab > 0) goToTab(currentTab-1);
    else goToTab(currentTab);
  }, {passive:true});
})();

async function addStock(){
  const mkt  = document.getElementById('mkt').value;
  const sym  = document.getElementById('sym').value.trim().toUpperCase();
  const qty  = parseFloat(document.getElementById('qty').value);
  const cost = parseFloat(document.getElementById('cost').value);
  const msg  = document.getElementById('add-msg');
  if(!sym||!qty||!cost){msg.textContent='請填寫所有欄位';return;}

  // Feature 2: check for existing position and offer merge
  const existing = stocks.find(s => s.sym === sym && s.mkt === mkt);
  if(existing){
    const doMerge = confirm(
      `已有 ${sym}（${fmt(existing.qty)} 股，均價 ${fmtD(existing.cost)}）\n` +
      `確定 → 合併計算加權均價\n取消 → 分開記錄`
    );
    if(doMerge){
      const newQty  = existing.qty + qty;
      const newCost = (existing.cost * existing.qty + cost * qty) / newQty;
      existing.qty  = newQty;
      existing.cost = parseFloat(newCost.toFixed(6));
      msg.innerHTML = `<span class="spinner"></span> 抓取股價中…`;
      const result  = await fetchPrice(sym, mkt);
      if(result?.price){ existing.price = result.price; existing.updatedAt = new Date().toLocaleTimeString('zh-TW'); }
      save(); renderStockList(); renderOverview();
      msg.textContent = `已合併 ${sym}，新均價 ${fmtD(existing.cost)}，共 ${fmt(existing.qty)} 股`;
      document.getElementById('qty').value='';
      document.getElementById('cost').value='';
      return;
    }
  }

  msg.innerHTML='<span class="spinner"></span> 抓取股價中…';
  const result = await fetchPrice(sym, mkt);
  const price  = result?.price ?? null;
  const currency = result?.currency ?? (mkt==='TW'?'TWD':'USD');
  const buydate = document.getElementById('buydate').value || new Date().toISOString().slice(0,10);
  stocks.push({id:Date.now(),mkt,sym,qty,cost,price,currency,buydate,updatedAt:price?new Date().toLocaleTimeString('zh-TW'):null});
  save(); renderStockList(); renderOverview();
  document.getElementById('sym').value='';
  document.getElementById('qty').value='';
  document.getElementById('cost').value='';
  msg.textContent = price ? `已新增 ${sym}，現價 ${fmtD(price)} ${currency}` : `已新增 ${sym}（抓取失敗：${result?.error||'未知錯誤'}）`;
}

function stockMVTWD(s){
  if(!s.price)return null;
  return s.currency==='USD'?s.price*USD_RATE*s.qty:s.price*s.qty;
}
function stockCostTWD(s){
  return s.currency==='USD'?s.cost*USD_RATE*s.qty:s.cost*s.qty;
}

  let sorted = [...stocks];
  const getMV  = s => stockMVTWD(s) ?? 0;
  const getPNL = s => { const mv=stockMVTWD(s); return mv!=null?mv-stockCostTWD(s):-Infinity; };
  const getPCT = s => { const mv=stockMVTWD(s),cv=stockCostTWD(s); return mv!=null&&cv>0?(mv-cv)/cv:-Infinity; };
  if(sortVal==='mv-desc')  sorted.sort((a,b)=>getMV(b)-getMV(a));
  if(sortVal==='mv-asc')   sorted.sort((a,b)=>getMV(a)-getMV(b));
  if(sortVal==='pnl-desc') sorted.sort((a,b)=>getPNL(b)-getPNL(a));
  if(sortVal==='pnl-asc')  sorted.sort((a,b)=>getPNL(a)-getPNL(b));
  if(sortVal==='pct-desc') sorted.sort((a,b)=>getPCT(b)-getPCT(a));
  if(sortVal==='pct-asc')  sorted.sort((a,b)=>getPCT(a)-getPCT(b));

  el.innerHTML = sorted.map(s=>{
    const mv  = stockMVTWD(s);

          <span style="font-size:18px;font-weight:700;color:var(--text)">${s.sym}</span>
          ${days?`<span style="font-size:11px;color:var(--text3);flex-shrink:0">${days}天</span>`:''}
        </div>

        <!-- 右：市值 + 損益 -->
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:15px;font-weight:700;color:var(--text);white-space:nowrap">${mv!=null?'NT$ '+fmtInt(mv):'—'}</div>
          <div style="font-size:13px;font-weight:700;color:${col};white-space:nowrap">${pnl!=null?`${isUp?'▲':'▼'} ${fmtInt(Math.abs(pnl))}`:'—'}</div>
          <div style="font-size:11px;color:${col};opacity:0.85;white-space:nowrap">${pct!=null?`(${pct>=0?'+':''}${fmtD(pct,1)}%)`:'—'}</div>
        </div>

        <!-- ⋯ 選單按鈕 -->
        <div style="position:relative;flex-shrink:0">
          <button onclick="toggleStockMenu(${s.id},this)" style="width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:16px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;letter-spacing:1px">⋯</button>

      ${hasHist?`<canvas id="spark-${s.id}" style="display:block;width:100%;height:36px;margin-top:8px;border-radius:4px"></canvas>`:''}

    </div>`;
  }).join('');

  setTimeout(()=>{
    sorted.forEach(s=>{
      const hist=priceHistory[s.sym];
      if(!hist||hist.length<2)return;
      const canvas=document.getElementById(`spark-${s.id}`);
      if(!canvas)return;
      const prices=hist.slice(-14).map(h=>h.price);
      const isUp=prices[prices.length-1]>=prices[0];
      const dpr=window.devicePixelRatio||1;
      const W=canvas.offsetWidth||300, H=36;
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.height=H+'px';
      const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
      const minP=Math.min(...prices),maxP=Math.max(...prices),range=maxP-minP||prices[0]*0.01||1;
      const tx=i=>i/(prices.length-1)*W;
      const ty=v=>4+((maxP-v)/range)*(H-8);
      const col=isUp?'#e07070':'#ff3b30';
      const grad=ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,isUp?'rgba(224,112,112,0.15)':'rgba(255,59,48,0.12)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.moveTo(tx(0),ty(prices[0]));
      for(let i=1;i<prices.length;i++) ctx.lineTo(tx(i),ty(prices[i]));
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle=grad; ctx.fill();
      ctx.beginPath(); ctx.moveTo(tx(0),ty(prices[0]));
      for(let i=1;i<prices.length;i++) ctx.lineTo(tx(i),ty(prices[i]));
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
      ctx.beginPath(); ctx.arc(tx(prices.length-1),ty(prices[prices.length-1]),2.5,0,Math.PI*2);
      ctx.fillStyle=col; ctx.fill();
    });
  },0);
}

function renderOverview(){
  const totalStockMV = stocks.reduce((a,s)=>{const v=stockMVTWD(s);return a+(v||0);},0);
  const totalCost    = stocks.reduce((a,s)=>a+stockCostTWD(s),0);
  const totalBank    = banks.reduce((a,b)=>a+bankTWD(b),0);
  const total        = totalStockMV + totalBank;
  const pnl          = totalStockMV - totalCost;
  const pct          = totalCost>0?pnl/totalCost*100:0;

  document.getElementById('header-total').textContent = 'NT$ '+fmtInt(total);
  document.getElementById('ov-total-big').textContent  = 'NT$ '+fmtInt(total);

  // Yesterday comparison (Feature 6)
  const today = new Date().toISOString().slice(0,10);
  const ydSnap = snapshots.filter(s=>s.date<today).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const ydEl = document.getElementById('ov-yesterday');
  if(ydEl){
    if(ydSnap){
      const diff=total-ydSnap.total, pct2=diff/ydSnap.total*100, isUp=diff>=0;
      ydEl.innerHTML=`<span style="color:${isUp?'var(--green)':'var(--red)'};font-weight:700">${isUp?'▲':'▼'} ${isUp?'+':''}${fmtInt(diff)} (${isUp?'+':''}${fmtD(pct2,2)}%)</span> <span style="color:var(--text3)">vs 昨日</span>`;
    } else {
      ydEl.textContent='';
    }
  }
  const totalRealized = realized.reduce((a,r)=>a+r.pnl,0);
  const realizedEl = document.getElementById('ov-realized');
  realizedEl.textContent = (totalRealized>=0?'+':'')+fmtInt(totalRealized);
  realizedEl.className = 'metric-value '+(totalRealized>=0?'up':'down');
  document.getElementById('ov-stock').textContent  = fmtInt(totalStockMV);
  document.getElementById('ov-bank').textContent   = fmtInt(totalBank);
  const pnlEl = document.getElementById('ov-pnl');
  pnlEl.textContent = (pnl>=0?'+':'')+fmtInt(pnl);
  pnlEl.className = 'metric-value '+(pnl>=0?'up':'down');
  const pctEl = document.getElementById('ov-pct');
  pctEl.textContent = (pct>=0?'+':'')+fmtD(pct,2)+'%';
  pctEl.className = 'metric-sub '+(pct>=0?'up':'down');

  /* Donut chart */
  const twMV = stocks.filter(s=>s.mkt==='TW').reduce((a,s)=>a+(stockMVTWD(s)||0),0);
  const usMV = stocks.filter(s=>s.mkt==='US').reduce((a,s)=>a+(stockMVTWD(s)||0),0);
  const segments=[{label:'台股',val:twMV,color:'#7c6fff'},{label:'美股',val:usMV,color:'#ff6b6b'},{label:'存款',val:totalBank,color:'#ffc850'}];
  const svgEl = document.getElementById('donut-svg');
  const R=40,cx=50,cy=50,sw=18,circ=2*Math.PI*R;
  let offset=0;
  let paths='<circle cx="50" cy="50" r="40" fill="none" stroke="#e5e5ea" stroke-width="18"/>';
  segments.forEach(seg=>{
    if(!total||!seg.val){return;}
    const frac=seg.val/total;
    const dash=frac*circ;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${seg.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" style="transform:rotate(-90deg);transform-origin:center"/>`;
    offset+=dash;
  });
  svgEl.innerHTML=paths;
  const legend=document.getElementById('donut-legend');
  legend.innerHTML=segments.map(seg=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${seg.color}"></div>
      <div class="legend-name">${seg.label}</div>
      <div class="legend-pct" style="color:${seg.color}">${total>0?fmtD(seg.val/total*100,1):'0'}%</div>
    </div>`).join('');

  /* PnL bars */
  const pnlWrap = document.getElementById('pnl-bars');
  // 合併相同股票，加權平均年化報酬率，並分台股/美股
  const pnlMap = {};
  stocks.forEach(s=>{
    const mv  = stockMVTWD(s)||stockCostTWD(s);
    const cv  = stockCostTWD(s);
    const pnl = mv - cv;
    const days = s.buydate ? Math.max(1, Math.floor((Date.now()-new Date(s.buydate))/86400000)) : 365;
    if(!pnlMap[s.sym]) pnlMap[s.sym] = {pnl:0, costSum:0, costDays:0, mkt:s.mkt, totalQty:0, totalCostAmt:0, price:s.price, currency:s.currency};
    pnlMap[s.sym].pnl += pnl;
    pnlMap[s.sym].costSum += cv;
    pnlMap[s.sym].costDays += cv * days;
    pnlMap[s.sym].totalQty += s.qty;
    pnlMap[s.sym].totalCostAmt += s.cost * s.qty;
    if(s.price) pnlMap[s.sym].price = s.price;
  });
  const pnlItems = Object.entries(pnlMap).map(([sym,v])=>{
    const avgDays = v.costSum > 0 ? v.costDays / v.costSum : 365;
    const annReturn = v.costSum > 0 ? (v.pnl / v.costSum) * (365 / avgDays) * 100 : 0;
    const avgCost = v.totalQty > 0 ? v.totalCostAmt / v.totalQty : 0;
    return {sym, pnl:v.pnl, annReturn, mkt:v.mkt, totalQty:v.totalQty, avgCost, price:v.price, currency:v.currency};
  });
  const twItems = pnlItems.filter(p=>p.mkt==='TW').sort((a,b)=>b.pnl-a.pnl);
  const usItems = pnlItems.filter(p=>p.mkt==='US').sort((a,b)=>b.pnl-a.pnl);
  if(!pnlItems.length){pnlWrap.innerHTML='<div class="empty">尚無股票損益資料</div>';return;}
  const maxAbs = Math.max(...pnlItems.map(p=>Math.abs(p.pnl)),1);
  function renderPnlGroup(items){
    return items.map((p,i)=>{
      const pct = Math.abs(p.pnl)/maxAbs*100;
      const col = p.pnl>=0?'#2dd4a0':'#ff6b6b';
      const annStr = (p.annReturn>=0?'+':'')+fmtD(p.annReturn,1)+'%/年';
      const uid = 'pnl-'+p.sym.replace(/[^a-zA-Z0-9]/g,'');
      return `<div style="border-bottom:1px solid var(--border);padding:8px 0">
        <div class="pnl-item" onclick="togglePnl('${uid}')" style="cursor:pointer">
          <div class="pnl-sym" style="color:var(--text2)">${p.sym}</div>
          <div class="pnl-track"><div class="pnl-fill" style="width:${pct.toFixed(1)}%;background:${col}"></div></div>
          <div class="pnl-val" style="color:${col}">${p.pnl>=0?'+':''}${fmtInt(p.pnl)}</div>
          <div style="font-size:12px;color:var(--text3);margin-left:4px">›</div>
        </div>
        <div id="${uid}" data-open="0" style="max-height:0;overflow:hidden;opacity:0;transition:max-height 0.3s ease,opacity 0.2s ease;padding:0 0 0 62px;font-size:12px">
          <div style="padding:6px 0 4px">
          <div style="color:${col};margin-bottom:4px">年化報酬率：${annStr}</div>
          <div style="color:var(--text2);display:flex;flex-direction:column;gap:3px">
            <span>總股數：${fmt(p.totalQty)}</span>
            <span>現價：${p.price?fmtD(p.price)+' '+p.currency:'—'}</span>
            <span>平均成本：${fmtD(p.avgCost)} ${p.currency}</span>
          </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  const sectionLabel = (label,color) => `<div style="font-size:10px;font-weight:700;color:${color};letter-spacing:.08em;text-transform:uppercase;margin:10px 0 6px">${label}</div>`;
  let html = '';
  if(twItems.length) html += sectionLabel('台股','#a89fff') + renderPnlGroup(twItems);
  if(usItems.length) html += sectionLabel('美股','#ff6b6b') + renderPnlGroup(usItems);
  pnlWrap.innerHTML = html;
}

let sellTargetId = null;
function openSellModal(id){

  const modal = document.getElementById('sell-modal');
  modal.style.display = 'flex';
  document.getElementById('sell-qty').addEventListener('input', updateSellPreview);
  document.getElementById('sell-price').addEventListener('input', updateSellPreview);
}
function updateSellPreview(){
  const s = stocks.find(s=>s.id===sellTargetId);
  if(!s) return;
  const qty = parseFloat(document.getElementById('sell-qty').value);
  const price = parseFloat(document.getElementById('sell-price').value);
  if(!qty||!price) return;
  const revenue = price * qty;
  const costPerShare = s.cost;
  const pnl = (price - costPerShare) * qty;
  const pct = pnl / (costPerShare * qty) * 100;
  const col = pnl>=0?'var(--green)':'var(--red)';
  document.getElementById('sell-preview').innerHTML =
    `損益預覽：<span style="color:${col};font-weight:600">${pnl>=0?'+':''}${fmtInt(pnl)} (${fmtD(pct,1)}%)</span>`;
}
function closeSellModal(){
  document.getElementById('sell-modal').style.display='none';
  sellTargetId = null;
}
function confirmSell(){
  const s = stocks.find(s=>s.id===sellTargetId);
  if(!s) return;
  const qty = parseFloat(document.getElementById('sell-qty').value);
  const price = parseFloat(document.getElementById('sell-price').value);
  const date = document.getElementById('sell-date').value;
  if(!qty||!price){ alert('請填寫賣出數量和價格'); return; }
  if(qty > s.qty){ alert(`持股不足，目前持有 ${s.qty} 股`); return; }
  const pnl = (price - s.cost) * qty;
  const pct = pnl / (s.cost * qty) * 100;
  realized.push({id:Date.now(), sym:s.sym, mkt:s.mkt, qty, buyPrice:s.cost, sellPrice:price, pnl, pct, buydate:s.buydate, selldate:date});
  if(qty === s.qty){
    stocks = stocks.filter(st=>st.id!==sellTargetId);
  } else {
    s.qty -= qty;
  }
  save();
  renderStockList();
  renderRealizedList();
  renderOverview();
  closeSellModal();
  showToast(`${s.sym} 賣出 ${qty} 股，損益 ${pnl>=0?'+':''}${fmtInt(pnl)}`,'💰');
}
function deleteRealized(id){
  realized = realized.filter(r=>r.id!==id);
  save(); renderRealizedList();
}

/* ── Snapshot ── */
function takeSnapshot(auto=false){
  const today = new Date().toISOString().slice(0,10);
  const totalStock = stocks.reduce((a,s)=>{const v=stockMVTWD(s);return a+(v||0);},0);
  const totalBank  = banks.reduce((a,b)=>a+bankTWD(b),0);
  const total = totalStock+totalBank;
  if(total<=0){ if(!auto) showToast('請先新增股票或存款','⚠️'); return; }
  const exists = snapshots.find(s=>s.date===today);
  if(auto && exists) return;
  if(exists) snapshots = snapshots.filter(s=>s.date!==today);
  snapshots.push({date:today,total,stock:totalStock,bank:totalBank});
  snapshots.sort((a,b)=>a.date.localeCompare(b.date));
  if(snapshots.length>365) snapshots=snapshots.slice(-365);
  localStorage.setItem('pt_snapshots',JSON.stringify(snapshots));
  renderOverview();
  if(!auto){ showToast('今日資產已記錄 📸'); renderCharts(); }
}

/* Feature 7: show single dot when only 1 snapshot */
function renderTrend(){
  const canvas=document.getElementById('trend-canvas');
  const empty=document.getElementById('trend-empty');
  const stats=document.getElementById('trend-stats');
  if(!canvas) return;

  if(snapshots.length===0){
    canvas.style.display='none'; empty.style.display='block'; stats.style.display='none';
    document.getElementById('trend-empty').innerHTML='<div style="font-size:28px;margin-bottom:8px">📈</div><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px">尚無走勢資料</div><div style="font-size:12px;line-height:1.6">點「記錄今日」開始追蹤<br>累積 2 天後顯示曲線</div>';
    return;
  }

  // Feature 7: single point state
  if(snapshots.length===1){
    empty.style.display='none'; stats.style.display='none';
    canvas.style.display='block';
    const H=100, W=canvas.parentElement?.clientWidth||340;
    canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');
    ctx.scale(devicePixelRatio,devicePixelRatio);
    ctx.clearRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(W/2,H/2,6,0,Math.PI*2);
    ctx.fillStyle='#e07070'; ctx.fill();
    ctx.beginPath(); ctx.arc(W/2,H/2,12,0,Math.PI*2);
    ctx.fillStyle='rgba(224,112,112,0.2)'; ctx.fill();
    ctx.font='bold 12px -apple-system,sans-serif'; ctx.fillStyle='var(--text2)'; ctx.textAlign='center';
    ctx.fillText('✓ 第一筆已記錄：'+snapshots[0].date, W/2, H/2+28);
    ctx.font='11px -apple-system,sans-serif'; ctx.fillStyle='var(--text3)';
    ctx.fillText('NT$ '+fmtInt(snapshots[0].total), W/2, H/2+46);
    return;
  }

  empty.style.display='none'; canvas.style.display='block'; stats.style.display='block';
  const first=snapshots[0].total, last=snapshots[snapshots.length-1].total;
  const diff=last-first, pct=diff/first*100, isUp=diff>=0;
  const col=isUp?'var(--green)':'var(--red)';
  document.getElementById('ts-days').textContent   = snapshots.length;
  document.getElementById('ts-growth').textContent = (isUp?'+':'')+fmtInt(diff);
  document.getElementById('ts-growth').style.color = col;
  document.getElementById('ts-pct').textContent    = (isUp?'+':'')+fmtD(pct,1)+'%';
  document.getElementById('ts-pct').style.color    = col;

  const H=200, W=canvas.parentElement?.clientWidth||340;
  canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);
  const vals=snapshots.map(s=>s.total);
  const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||1;
  const pad={t:28,r:40,b:30,l:40};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const tx=i=>pad.l+(i/(snapshots.length-1))*cw;
  const ty=v=>pad.t+ch-((v-minV)/range)*ch;
  const lineCol=isUp?'#e07070':'#ff3b30';
  ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
  [0.25,0.5,0.75].forEach(r=>{ const y=pad.t+ch*r; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke(); });
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,isUp?'rgba(224,112,112,0.18)':'rgba(255,59,48,0.15)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.moveTo(tx(0),ty(vals[0]));
  for(let i=1;i<vals.length;i++) ctx.lineTo(tx(i),ty(vals[i]));
  ctx.lineTo(tx(vals.length-1),pad.t+ch); ctx.lineTo(tx(0),pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(tx(0),ty(vals[0]));
  for(let i=1;i<vals.length;i++) ctx.lineTo(tx(i),ty(vals[i]));
  ctx.strokeStyle=lineCol; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
  const lx=tx(vals.length-1), ly=ty(vals[vals.length-1]);
  ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2); ctx.fillStyle=lineCol; ctx.fill();
  ctx.beginPath(); ctx.arc(lx,ly,8,0,Math.PI*2); ctx.fillStyle=isUp?'rgba(224,112,112,0.2)':'rgba(255,59,48,0.15)'; ctx.fill();
  // Max label — align right if in right half, left if in left half
  const maxIdx=vals.indexOf(maxV);
  const labelX=tx(maxIdx);
  const inRightHalf=labelX > W/2;
  ctx.font='bold 10px -apple-system,sans-serif'; ctx.fillStyle='#e07070';
  ctx.textAlign=inRightHalf?'right':'left';
  const clampedX=inRightHalf ? Math.min(labelX, W-pad.r) : Math.max(labelX, pad.l);
  ctx.fillText('▲ '+fmtInt(maxV), clampedX, ty(maxV)-8);
  ctx.font='10px -apple-system,sans-serif'; ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.textAlign='left';  ctx.fillText(snapshots[0].date.slice(5), pad.l, H-6);
  ctx.textAlign='right'; ctx.fillText(snapshots[snapshots.length-1].date.slice(5), W-pad.r, H-6);
}

function renderAllocChart(){

  const barsEl=document.getElementById('ch-alloc-bars');

  const totalBank=banks.reduce((a,b)=>a+bankTWD(b),0);
  const grand=totalStock+totalBank;
  if(grand<=0){ empty.style.display='block'; content.style.display='none'; return; }
  empty.style.display='none'; content.style.display='block';
  const COLORS=['#3478f6','#e07070','#ff9f0a','#34c759','#af52de','#5ac8fa','#ff6b6b','#30b0c7'];
  const segs=[];
  stocks.forEach((s,i)=>{ const v=stockMVTWD(s)||0; if(v>0) segs.push({label:s.sym,value:v,color:COLORS[i%COLORS.length]}); });
  if(totalBank>0) segs.push({label:'存款',value:totalBank,color:'#aeaeb2'});
  const cx=80,cy=80,R=62,r=42; let html='', angle=-Math.PI/2;
  segs.forEach(seg=>{
    const a=seg.value/grand*Math.PI*2, end=angle+a;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(end),y2=cy+R*Math.sin(end);
    const ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    const ix2=cx+r*Math.cos(end),iy2=cy+r*Math.sin(end);
    const lg=a>Math.PI?1:0;
    html+=`<path d="M${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${lg},0 ${ix1},${iy1} Z" fill="${seg.color}" stroke="#ffffff" stroke-width="2"/>`;
    angle=end;
  });
  html+=`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="9" fill="#aeaeb2" font-family="-apple-system,sans-serif">總資產</text>`;
  html+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" font-weight="700" fill="#1c1c1e" font-family="-apple-system,sans-serif">${fmtInt(grand/10000)}萬</text>`;
  const lx=170;
  segs.slice(0,6).forEach((seg,i)=>{
    const y=14+i*24;
    html+=`<rect x="${lx}" y="${y-7}" width="8" height="8" rx="2" fill="${seg.color}"/>`;
    html+=`<text x="${lx+13}" y="${y+1}" font-size="11" fill="#1c1c1e" font-family="-apple-system,sans-serif" font-weight="600">${seg.label}</text>`;
    html+=`<text x="278" y="${y+1}" text-anchor="end" font-size="11" fill="#6e6e73" font-family="-apple-system,sans-serif">${(seg.value/grand*100).toFixed(1)}%</text>`;
  });
  svg.innerHTML=html;
  barsEl.innerHTML=segs.map(seg=>{
    const pct=seg.value/grand*100;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12px;font-weight:600;color:var(--text)">${seg.label}</span>
        <span style="font-size:12px;color:var(--text2)">NT$ ${fmtInt(seg.value)} <span style="font-weight:700;color:var(--text)">${pct.toFixed(1)}%</span></span>
      </div>
      <div style="background:var(--bg3);border-radius:6px;height:6px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${seg.color};border-radius:6px"></div>
      </div>
    </div>`;
  }).join('');
}

function renderPnlChart(){
  const el=document.getElementById('ch-stock-pnl');
  if(!el) return;
  const data=stocks.map(s=>{
    const mv=stockMVTWD(s)||0, cost=stockCostTWD(s);
    const pnl=mv-cost, pct=cost>0?pnl/cost*100:0;
    return {sym:s.sym,mkt:s.mkt,mv,cost,pnl,pct};
  }).filter(s=>s.cost>0).sort((a,b)=>b.pct-a.pct);
  if(!data.length){ el.innerHTML='<div class="empty">尚無持股資料</div>'; return; }
  const maxAbs=Math.max(...data.map(d=>Math.abs(d.pct)),1);
  el.innerHTML=data.map(d=>{
    const up=d.pnl>=0, col=up?'#e07070':'#ff3b30';
    const barW=(Math.abs(d.pct)/maxAbs*100).toFixed(1);
    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge badge-${d.mkt.toLowerCase()}">${d.mkt}</span>
          <span style="font-size:14px;font-weight:700;color:var(--text)">${d.sym}</span>
        </div>
        <div>
          <span style="font-size:13px;font-weight:700;color:${col}">${up?'▲':'▼'} ${fmtD(Math.abs(d.pct),1)}%</span>
          <span style="font-size:11px;color:var(--text2);margin-left:6px">${up?'+':''}${fmtInt(d.pnl)}</span>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;position:relative">
        <div style="position:absolute;${up?'left':'right'}:0;width:${barW}%;height:100%;background:${up?'rgba(224,112,112,0.7)':'rgba(255,59,48,0.6)'};border-radius:6px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        <span style="font-size:10px;color:var(--text3)">成本 ${fmtInt(d.cost)}</span>
        <span style="font-size:10px;color:var(--text3)">市值 ${fmtInt(d.mv)}</span>
      </div>
    </div>`;
  }).join('');
}
</script>
<!-- Sell Modal -->
<div id="sell-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px calc(var(--safe-bot)+24px);width:100%;max-width:430px">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">賣出 <span id="sell-sym-label"></span></div>
    <div class="form-grid">
      <div class="form-group">
        <div class="form-label">賣出數量</div>
        <input class="form-input" id="sell-qty" type="number" placeholder="100" step="any" inputmode="decimal">
      </div>
      <div class="form-group">
        <div class="form-label">賣出價格</div>
        <input class="form-input" id="sell-price" type="number" placeholder="800" step="any" inputmode="decimal">
      </div>
      <div class="form-group full">
        <div class="form-label">賣出日期</div>
        <input class="form-input" id="sell-date" type="date">
      </div>
    </div>
    <div id="sell-preview" style="font-size:13px;color:var(--text2);margin:8px 0 16px;min-height:20px"></div>
    <div style="display:flex;gap:10px">
      <button class="add-btn" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)" onclick="closeSellModal()">取消</button>
      <button class="add-btn" onclick="confirmSell()">確認賣出</button>
    </div>
  </div>
</div>
</body>
</html>
